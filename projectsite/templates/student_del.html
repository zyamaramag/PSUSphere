{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="content">
    <div class="container-fluid">
        <h4 class="page-title">Delete Org Member</h4>
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Confirm Deletion</div>
                        <div class="card-category">This action cannot be undone</div>
                    </div>
                    <div class="card-body">
                        <form method="post">
                            {% csrf_token %}
                            <p>Are you sure you want to delete "<strong>{{ object.name }}</strong>"?</p>

                            <div class="form-group">
                                <button type="submit" class="btn btn-danger btn-rounded">Delete</button>
                                <a href="{% url 'orgmember-list' %}" class="btn btn-secondary btn-rounded">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
