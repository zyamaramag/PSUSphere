{% extends 'base.html' %}
{% load static %}
{% block content %}

<div class="content">
    <div class="container-fluid">

        <h4 class="page-title">College</h4>

        <div class="row">
            <div class="col-md-12">

                <div class="card">

                    <div class="card-header">
                        <div class="card-title">List of Colleges</div>
                    </div>

                    <br>

                    <div class="col-md-12 row">

                        <!-- Search -->
                        <div class="col-md-6">
                            <form class="navbar-left navbar-form nav-search mr-md-3" action="{% url 'college-list' %}" method="get">
                                <div class="input-group">
                                    <input 
                                        type="text" 
                                        placeholder="Search ..." 
                                        class="form-control" 
                                        name="q" 
                                        value="{{ request.GET.q }}"
                                    />
                                    <div class="input-group-append">
                                        <span class="input-group-text">
                                            <i class="la la-search search-icon"></i>
                                        </span>
                                    </div>
                                </div>
                            </form>
                        </div>

                        <!-- Add Button -->
                        <div class="col-md-6">
                            <div class="pull-right">
                                <a href="{% url 'college-add' %}" class="btn btn-success btn-rounded">
                                    Add College
                                </a>
                            </div>
                        </div>

                    </div>

                    <div class="card-body">

                        <table class="table table-striped mt-3">

                            <thead>
                                <tr>
                                    <th>College Name</th>
                                    <th>Action</th>
                                </tr>
                            </thead>

                            <tbody>

                                {% for object in object_list %}
                                <tr>

                                    <td>{{ object.college_name }}</td>

                                    <td>
                                        <a href="college_list/{{ object.id }}">Edit</a> |
                                        <a href="college_list/{{ object.id }}/delete" class="text-danger">Delete</a>
                                    </td>

                                </tr>

                                {% empty %}
                                <tr>
                                    <td colspan="2" style="text-align:center;">
                                        No Records Found
                                    </td>
                                </tr>
                                {% endfor %}

                            </tbody>

                        </table>

                        {% include 'includes/pagination.html' %}

                    </div>

                </div>

            </div>
        </div>

    </div>
</div>

{% endblock %}
